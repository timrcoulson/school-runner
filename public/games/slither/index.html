<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Slither N Spark — The Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
    }
    #back-btn {
      position: fixed; top: 8px; left: 8px;
      background: rgba(0,0,0,0.5); color: #ffdd57;
      border: 2px solid #ffdd57; padding: 4px 10px;
      font-family: 'Courier New', monospace; font-size: 11px;
      font-weight: bold; cursor: pointer; border-radius: 4px;
      z-index: 50; text-decoration: none; letter-spacing: 1px;
    }
    #back-btn:hover { background: rgba(255,221,87,0.15); }
    #game-container { position: relative; }
    canvas {
      display: block; image-rendering: pixelated;
      border: 3px solid #e94560; border-radius: 4px;
    }
    #hud {
      position: absolute; top: 8px; left: 8px; right: 8px;
      display: flex; justify-content: space-between;
      pointer-events: none; z-index: 10;
    }
    .hud-item {
      color: #fff; font-size: 14px; font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }
    .hud-item span { color: #ffdd57; }
    #overlay, #overlay-dead {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,26,0.9);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; gap: 12px; overflow-y: auto;
    }
    .hidden { display: none !important; }
    #overlay h1, #overlay-dead h1 {
      color: #e94560; font-size: 26px;
      text-shadow: 3px 3px 0 #000; text-align: center; line-height: 1.3;
    }
    #overlay p, #overlay-dead p {
      color: #ccc; font-size: 12px; text-align: center;
      max-width: 280px; line-height: 1.6;
    }
    .subtitle { color: #888; font-size: 10px; }
    .btn {
      background: #e94560; color: #fff; border: none;
      padding: 12px 36px; font-size: 16px;
      font-family: 'Courier New', monospace; font-weight: bold;
      cursor: pointer; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 3px;
    }
    .btn:hover { transform: scale(1.05); }
    .btn-secondary { background: transparent; border: 2px solid #e94560; padding: 10px 30px; font-size: 14px; }
    #final-score { color: #fff; font-size: 42px; font-weight: bold; text-shadow: 3px 3px 0 #e94560; }
    .lb-title { color: #ffdd57; font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 6px; letter-spacing: 2px; }
    .lb-row { display: flex; justify-content: space-between; padding: 3px 6px; color: #ccc; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .lb-row:nth-child(2) { color: #ffdd57; }
    .lb-rank { width: 22px; text-align: right; margin-right: 6px; }
    .lb-name { flex: 1; }
    .lb-score { font-weight: bold; color: #fff; }
    .lb-loading { color: #888; font-size: 11px; text-align: center; padding: 10px; }
    #name-input { background: rgba(255,255,255,0.1); border: 2px solid #e94560; color: #fff; padding: 8px 12px; font-size: 14px; font-family: 'Courier New', monospace; text-align: center; text-transform: uppercase; width: 180px; border-radius: 4px; outline: none; letter-spacing: 2px; }
    #name-input::placeholder { color: #666; text-transform: none; letter-spacing: 1px; }
    #name-input:focus { border-color: #ffdd57; }
    #submit-msg { color: #aaa; font-size: 10px; height: 12px; }
    #tide-warning {
      position: absolute; bottom: 40px; left: 0; right: 0;
      text-align: center; color: #44aaff; font-size: 12px;
      font-weight: bold; text-shadow: 0 0 10px #44aaff;
      pointer-events: none; z-index: 15; opacity: 0;
      transition: opacity 0.3s; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <a id="back-btn" href="/">BACK</a>
  <div id="game-container">
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="hud-item">LENGTH: <span id="hud-length">3</span></div>
      <div class="hud-item">SCORE: <span id="hud-score">0</span></div>
    </div>
    <div id="tide-warning">TIDE RISING...</div>
    <div id="overlay">
      <h1>SLITHER<br>N SPARK</h1>
      <p>You're a live wire! Eat sparks to grow. Avoid yourself, the walls, and the rising tide!</p>
      <p class="subtitle">Arrow keys / WASD / Swipe to steer</p>
      <button class="btn" id="start-btn">SPARK!</button>
      <div id="start-leaderboard" style="width:240px">
        <div class="lb-loading">Loading leaderboard...</div>
      </div>
    </div>
    <div id="overlay-dead" class="hidden">
      <h1>SHORT CIRCUIT!</h1>
      <div id="final-score">0</div>
      <p id="death-msg"></p>
      <div>
        <input type="text" id="name-input" maxlength="12" placeholder="Your name" autocomplete="off" />
        <button class="btn" id="submit-score-btn" style="margin-top:8px">SUBMIT SCORE</button>
        <div id="submit-msg"></div>
      </div>
      <button class="btn btn-secondary" id="retry-btn">TRY AGAIN</button>
      <div id="leaderboard" style="width:240px">
        <div class="lb-loading">Loading...</div>
      </div>
    </div>
  </div>
  <script src="/shared/leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
